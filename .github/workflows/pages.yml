name: Déploiement GitHub Pages

# Publie le jeu (HTML statique, sans build) sur GitHub Pages à chaque push sur main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Une seule publication à la fois ; on ne coupe pas un déploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Cache-busting (remplace __BUILD__ par le SHA du commit)
        run: |
          sed -i "s/__BUILD__/${GITHUB_SHA}/g" index.html
          echo "--- version injectée ---"; grep -n "var version" index.html

      - name: Empaqueter le site (racine du dépôt)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
